<!doctype html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI-Windows V3.1 (Minesweeper Edition)</title>
    <style>
        /* CSS RESET & VARIABLES */
        :root {
            --bg: #111;
            --accent: #0078d4;
            --glass: rgba(30, 30, 30, 0.95);
            --border: rgba(255, 255, 255, 0.15);
            --text: #fff;
            --font: 'Segoe UI', sans-serif;
        }
        * { box-sizing: border-box; user-select: none; }
        body { margin: 0; height: 100vh; overflow: hidden; font-family: var(--font); background: #000; color: var(--text); }
        .hidden { display: none !important; }
        
        /* WALLPAPER */
        #wallpaper { position: absolute; inset: 0; z-index: 0; background: linear-gradient(135deg, #1e3c72 0%, #2a5298 100%); }

        /* LOGIN */
        #login { position: fixed; inset: 0; z-index: 9000; background: #000; display: flex; flex-direction: column; align-items: center; justify-content: center; }
        .avatar { width: 100px; height: 100px; background: #444; border-radius: 50%; margin-bottom: 20px; display:flex; justify-content:center; align-items:center; font-size:40px; border:2px solid var(--accent); }
        input { padding: 10px; background: #222; border: 1px solid #555; color: white; text-align: center; margin-bottom: 10px; border-radius: 5px; }
        button { padding: 8px 20px; background: var(--accent); border: none; color: white; cursor: pointer; border-radius: 5px; }

        /* DESKTOP */
        #desktop { position: absolute; inset: 0; z-index: 1; }
        .icon-grid { padding: 10px; display: flex; flex-direction: column; gap: 10px; flex-wrap: wrap; height: 90vh; align-content: flex-start; }
        .icon { width: 80px; text-align: center; padding: 10px 5px; border-radius: 5px; cursor: pointer; color: white; text-shadow: 0 1px 2px black; }
        .icon:hover { background: rgba(255,255,255,0.1); }
        .icon svg { width: 40px; height: 40px; margin-bottom: 5px; }

        /* WINDOWS */
        .window { position: absolute; background: var(--glass); border: 1px solid var(--border); border-radius: 8px; display: flex; flex-direction: column; box-shadow: 0 20px 50px rgba(0,0,0,0.5); min-width: 300px; min-height: 200px; overflow: hidden; }
        .window.active { border-color: #666; box-shadow: 0 20px 60px rgba(0,0,0,0.8); }
        
        .window.maximized { top: 0 !important; left: 0 !important; width: 100% !important; height: calc(100% - 48px) !important; border-radius: 0; transform: none !important; }
        .window.minimized { display: none; }

        .win-head { height: 32px; background: rgba(255,255,255,0.05); display: flex; align-items: center; justify-content: space-between; padding: 0 10px; cursor: default; }
        .win-title { font-size: 13px; pointer-events: none; }
        .win-btns { display: flex; gap: 8px; }
        .wb { width: 12px; height: 12px; border-radius: 50%; border: none; cursor: pointer; }
        .wb.close { background: #ff5f56; } .wb.min { background: #ffbd2e; } .wb.max { background: #27c93f; }

        .win-body { flex: 1; position: relative; overflow: hidden; background: #111; display: flex; flex-direction: column; }

        /* TASKBAR */
        #taskbar { position: absolute; bottom: 0; width: 100%; height: 48px; background: rgba(20,20,20,0.95); display: flex; align-items: center; padding: 0 10px; z-index: 5000; border-top: 1px solid #333; }
        .tb-btn { width: 40px; height: 40px; display: flex; justify-content: center; align-items: center; border-radius: 5px; cursor: pointer; margin-right: 4px; }
        .tb-btn:hover { background: rgba(255,255,255,0.1); }
        .tb-btn.active { background: rgba(255,255,255,0.2); border-bottom: 3px solid var(--accent); }
        
        /* START MENU */
        #start { position: absolute; bottom: 50px; left: 10px; width: 350px; background: rgba(30,30,30,0.98); border: 1px solid #444; border-radius: 8px; padding: 15px; display: none; z-index: 4999; }
        #start.show { display: block; }
        .start-item { padding: 10px; display: flex; align-items: center; gap: 10px; cursor: pointer; border-radius: 5px; }
        .start-item:hover { background: rgba(255,255,255,0.1); }

        /* MINESWEEPER STYLES */
        .ms-container { background: #c0c0c0; color: black; height: 100%; padding: 10px; display: flex; flex-direction: column; align-items: center; border: 2px solid; border-color: #fff #808080 #808080 #fff; }
        .ms-header { background: #c0c0c0; border: 2px solid; border-color: #808080 #fff #fff #808080; width: 100%; display: flex; justify-content: space-between; padding: 5px; margin-bottom: 10px; }
        .ms-counter { background: #000; color: #f00; font-family: monospace; font-size: 20px; padding: 2px 5px; width: 50px; text-align: center; }
        .ms-face { width: 26px; height: 26px; background: #c0c0c0; border: 2px outset #fff; display: flex; justify-content: center; align-items: center; cursor: pointer; font-weight: bold; font-size: 18px; }
        .ms-face:active { border-style: inset; }
        .ms-grid { display: grid; grid-template-columns: repeat(9, 25px); gap: 0; border: 3px solid; border-color: #808080 #fff #fff #808080; }
        .ms-cell { width: 25px; height: 25px; background: #c0c0c0; border: 2px outset #fff; cursor: pointer; display: flex; justify-content: center; align-items: center; font-weight: bold; font-family: monospace; font-size: 14px; user-select: none; }
        .ms-cell:active { border: 1px solid #808080; }
        .ms-cell.open { border: 1px solid #808080; border-right: none; border-bottom: none; background: #c0c0c0; color: #000; }
        .ms-cell.flag { color: red; }
        .ms-cell.mine { background: red; color: black; }
        
        /* Colors for numbers */
        .c1 { color: blue; } .c2 { color: green; } .c3 { color: red; } .c4 { color: darkblue; } .c5 { color: darkred; }

        /* BROWSER STYLES */
        .browser-nav { padding: 8px; background: #333; display: flex; gap: 5px; }
        .browser-url { flex: 1; padding: 5px 10px; border-radius: 20px; border: none; background: #111; color: white; }
        .gh-file { padding: 8px; border-bottom: 1px solid #333; cursor: pointer; display: flex; align-items: center; gap: 10px; }
        .gh-file:hover { background: #222; }
        .code-view { padding: 15px; white-space: pre-wrap; font-family: monospace; user-select: text; color: #ddd; }
        .readme { padding: 20px; background: #0d1117; border: 1px solid #333; margin: 10px; border-radius: 5px; }
    </style>
</head>
<body>

    <!-- 1. BOOT / LOGIN -->
    <div id="login">
        <div class="avatar">👤</div>
        <h3>AI User</h3>
        <input type="password" id="pass" placeholder="PIN: 1234">
        <button onclick="System.login()">Log In</button>
        <div id="error-log" style="color:red; margin-top:20px; font-size:12px; max-width:80%;"></div>
    </div>

    <!-- 2. DESKTOP -->
    <div id="wallpaper"></div>
    <div id="desktop">
        <div class="icon-grid" id="icons"></div>
        <div id="windows"></div>
    </div>

    <!-- 3. INTERFACE -->
    <div id="start"></div>
    <div id="taskbar">
        <div class="tb-btn" onclick="System.toggleStart()" title="Start">
            <svg width="24" height="24" viewBox="0 0 24 24" fill="#fff"><path d="M3 3h18v18H3z"/></svg>
        </div>
        <div id="dock" style="display:flex;"></div>
        <div style="margin-left:auto; font-size:12px; color:#aaa;" id="clock">12:00</div>
    </div>

    <script>
        // GLOBAL ERROR HANDLER
        window.onerror = function(msg, url, line) {
            document.getElementById('error-log').innerText = "System Error: " + msg + " line " + line;
            alert("System Error:\n" + msg);
        };

        // --- ICONS (SVG) ---
        const ICONS = {
            pc: '<svg viewBox="0 0 24 24" fill="#50e6ff"><path d="M2 4h18v14H2V4zm2 2v10h14V6H4zm3 14h10v2H7v-2z"/></svg>',
            browser: '<svg viewBox="0 0 24 24" fill="#369eff"><circle cx="12" cy="12" r="10"/></svg>',
            github: '<svg viewBox="0 0 24 24" fill="#fff"><path d="M12 2C6.47 2 2 6.47 2 12c0 4.42 2.87 8.17 6.84 9.49.5.09.68-.21.68-.48v-1.71c-2.78.6-3.37-1.34-3.37-1.34-.46-1.16-1.11-1.47-1.11-1.47-.91-.62.07-.6.07-.6 1 .07 1.53 1.03 1.53 1.03.89 1.52 2.34 1.1 2.91.83.1-.65.35-1.09.63-1.34-2.22-.25-4.55-1.11-4.55-4.94 0-1.1.39-2 1.03-2.69-.1-.25-.45-1.27.1-2.65 0 0 .84-.27 2.75 1.02a9.56 9.56 0 015 0c1.91-1.29 2.75-1.02 2.75-1.02.55 1.38.2 2.4.1 2.65.64.69 1.03 1.59 1.03 2.69 0 3.84-2.34 4.69-4.57 4.94.36.31.68.92.68 1.85v2.75c0 .27.18.58.69.48A10.02 10.02 0 0022 12c0-5.52-4.48-10-10-10z"/></svg>',
            mine: '<svg viewBox="0 0 24 24" fill="#000"><circle cx="12" cy="12" r="10"/><path d="M12 2v20M2 12h20" stroke="#fff" stroke-width="2"/></svg>'
        };

        // --- SYSTEM OBJECT ---
        const System = {
            wins: [],
            z: 100,

            // LOGIN
            login: function() {
                const p = document.getElementById('pass').value;
                if(p === '1234') {
                    document.getElementById('login').style.display = 'none';
                    this.initDesktop();
                } else {
                    alert('Wrong PIN (Use 1234)');
                }
            },

            // DESKTOP RENDER
            initDesktop: function() {
                const icons = [
                    { name: "My PC", icon: ICONS.pc, action: 'explorer' },
                    { name: "GitHub", icon: ICONS.github, action: 'github' },
                    { name: "Browser", icon: ICONS.browser, action: 'browser' },
                    { name: "Minesweeper", icon: ICONS.mine, action: 'mines' }
                ];
                
                const grid = document.getElementById('icons');
                const start = document.getElementById('start');
                
                icons.forEach(app => {
                    const el = document.createElement('div');
                    el.className = 'icon';
                    el.innerHTML = `${app.icon}<div>${app.name}</div>`;
                    el.ondblclick = () => Apps.launch(app.action);
                    grid.appendChild(el);

                    const item = document.createElement('div');
                    item.className = 'start-item';
                    item.innerHTML = `${app.icon} ${app.name}`;
                    item.onclick = () => { Apps.launch(app.action); this.toggleStart(); };
                    start.appendChild(item);
                });

                setInterval(() => document.getElementById('clock').innerText = new Date().toLocaleTimeString([], {hour:'2-digit',minute:'2-digit'}), 1000);
            },

            toggleStart: function() {
                document.getElementById('start').classList.toggle('show');
            },

            // WINDOW MANAGEMENT
            openWindow: function(title, html, width='800px', height='500px') {
                const id = 'w-' + Date.now();
                const win = document.createElement('div');
                win.className = 'window active';
                win.id = id;
                win.style.left = (50 + this.wins.length * 30) + 'px';
                win.style.top = (50 + this.wins.length * 30) + 'px';
                win.style.width = width;
                win.style.height = height;
                win.style.zIndex = ++this.z;

                win.innerHTML = `
                    <div class="win-head" onmousedown="System.dragStart(event, '${id}')">
                        <div class="win-title">${title}</div>
                        <div class="win-btns">
                            <button class="wb min" onclick="System.min('${id}')"></button>
                            <button class="wb max" onclick="System.max('${id}')"></button>
                            <button class="wb close" onclick="System.close('${id}')"></button>
                        </div>
                    </div>
                    <div class="win-body">${html}</div>
                `;

                win.onmousedown = () => System.focus(id);
                document.getElementById('windows').appendChild(win);

                const btn = document.createElement('div');
                btn.className = 'tb-btn active';
                btn.id = 'tb-' + id;
                btn.innerHTML = ICONS.browser; 
                btn.onclick = () => System.toggle(id);
                document.getElementById('dock').appendChild(btn);

                this.wins.push(id);
                return id; 
            },

            close: function(id) {
                document.getElementById(id).remove();
                document.getElementById('tb-' + id).remove();
                this.wins = this.wins.filter(x => x !== id);
                // Clean up Minesweeper timer if exists
                if(Apps.minesweeper.timers[id]) clearInterval(Apps.minesweeper.timers[id]);
            },

            min: function(id) {
                document.getElementById(id).classList.add('minimized');
                document.getElementById('tb-' + id).classList.remove('active');
            },

            max: function(id) {
                const w = document.getElementById(id);
                w.classList.toggle('maximized');
            },

            focus: function(id) {
                const w = document.getElementById(id);
                if(w) {
                    w.style.zIndex = ++this.z;
                    document.querySelectorAll('.window').forEach(x => x.classList.remove('active'));
                    document.querySelectorAll('.tb-btn').forEach(x => x.classList.remove('active'));
                    w.classList.add('active');
                    w.classList.remove('minimized');
                    document.getElementById('tb-' + id).classList.add('active');
                }
            },

            toggle: function(id) {
                const w = document.getElementById(id);
                if (w.classList.contains('minimized') || !w.classList.contains('active')) {
                    this.focus(id);
                } else {
                    this.min(id);
                }
            },

            dragStart: function(e, id) {
                if(e.target.tagName === 'BUTTON') return;
                const w = document.getElementById(id);
                if(w.classList.contains('maximized')) return;

                let shiftX = e.clientX - w.getBoundingClientRect().left;
                let shiftY = e.clientY - w.getBoundingClientRect().top;

                function move(ev) {
                    w.style.left = (ev.clientX - shiftX) + 'px';
                    w.style.top = (ev.clientY - shiftY) + 'px';
                }
                function stop() {
                    document.removeEventListener('mousemove', move);
                    document.removeEventListener('mouseup', stop);
                }
                document.addEventListener('mousemove', move);
                document.addEventListener('mouseup', stop);
            }
        };

        // --- APPS LOGIC ---
        const Apps = {
            launch: function(appType) {
                if (appType === 'explorer') this.openExplorer(['C:']);
                if (appType === 'github') this.openBrowser('https://github.com/maybeoff');
                if (appType === 'browser') this.openBrowser('about:home');
                if (appType === 'mines') this.minesweeper.run();
            },

            openExplorer: function(path) {
                const html = `
                    <div class="browser-nav">
                        <button onclick="Apps.openExplorer(['C:'])">Home</button>
                        <input class="browser-url" value="${path.join('/')}" readonly>
                    </div>
                    <div style="padding:10px; color:#ccc;">
                        Local Files (Demo):<br>
                        <div class="gh-file">📄 Notes.txt</div>
                        <div class="gh-file" onclick="Apps.openBrowser('https://github.com/maybeoff')">🌐 Network Projects</div>
                    </div>
                `;
                System.openWindow('Explorer', html);
            },

            openBrowser: function(url) {
                const html = `
                    <div class="browser-nav">
                        <button onclick="Apps.nav(this, 'home')">🏠</button>
                        <input class="browser-url" value="${url}" onkeydown="if(event.key==='Enter') Apps.nav(this, 'go')">
                        <button onclick="Apps.nav(this, 'go')">Go</button>
                    </div>
                    <div class="browser-content" style="flex:1; overflow:auto;">Loading...</div>
                `;
                const id = System.openWindow('Browser', html);
                this.loadUrl(document.getElementById(id), url);
            },

            nav: function(elem, action) {
                const win = elem.closest('.window');
                const inp = win.querySelector('.browser-url');
                if (action === 'home') this.loadUrl(win, 'about:home');
                else this.loadUrl(win, inp.value);
            },

            loadUrl: function(win, url) {
                const content = win.querySelector('.browser-content');
                const input = win.querySelector('.browser-url');
                input.value = url;

                if (url.includes('github.com')) {
                    const parts = url.split('github.com/')[1].split('/');
                    const user = parts[0];
                    const repo = parts[1];
                    if (!repo) this.fetchUser(content, user);
                    else this.fetchRepo(content, user, repo);
                    return;
                }

                if (url === 'about:home') {
                    content.innerHTML = `<div style="text-align:center; padding:50px;"><h1>AI Browser</h1><button onclick="Apps.loadUrl(this.closest('.window'), 'https://github.com/maybeoff')">Open My GitHub</button></div>`;
                    return;
                }

                if (!url.startsWith('http')) url = 'https://' + url;
                content.innerHTML = `<iframe src="${url}" style="width:100%; height:100%; border:none;"></iframe>`;
            },

            // --- GITHUB API ---
            fetchUser: function(container, user) {
                container.innerHTML = '<div style="padding:20px">Loading User...</div>';
                fetch(`https://api.github.com/users/${user}/repos`)
                    .then(r => r.json())
                    .then(repos => {
                        if (!Array.isArray(repos)) { container.innerHTML = "User not found or API limit."; return; }
                        let html = `<div style="padding:10px"><h2>${user} Repositories</h2>`;
                        repos.forEach(r => { html += `<div class="gh-file" onclick="Apps.loadUrl(this.closest('.window'), 'https://github.com/${user}/${r.name}')">📦 ${r.name}</div>`; });
                        html += '</div>';
                        container.innerHTML = html;
                    })
                    .catch(e => container.innerHTML = "Error: " + e.message);
            },

            fetchRepo: function(container, user, repo) {
                container.innerHTML = '<div style="padding:20px">Loading Repo...</div>';
                const apiUrl = `https://api.github.com/repos/${user}/${repo}`;
                Promise.all([fetch(apiUrl + '/contents').then(r => r.json()), fetch(apiUrl + '/readme').then(r => r.json())])
                .then(([files, readme]) => {
                    let html = `<div style="padding:10px"><h3>${repo}</h3>`;
                    if (Array.isArray(files)) {
                        files.sort((a,b) => (a.type === b.type ? 0 : a.type === 'dir' ? -1 : 1));
                        files.forEach(f => { html += `<div class="gh-file" onclick="Apps.viewFile(this.closest('.window'), '${f.url}')">${f.type==='dir'?'📁':'📄'} ${f.name}</div>`; });
                    }
                    if (readme.content) {
                        const txt = this.decodeBase64(readme.content);
                        html += `<div class="readme"><b>README.md</b><pre style="white-space:pre-wrap;">${txt}</pre></div>`;
                    }
                    html += '</div>';
                    container.innerHTML = html;
                }).catch(e => container.innerHTML = "Error: API Limit or Network. " + e.message);
            },

            viewFile: function(win, url) {
                const content = win.querySelector('.browser-content');
                content.innerHTML = "Loading file...";
                fetch(url).then(r=>r.json()).then(data => {
                    if(data.content) {
                        const txt = this.decodeBase64(data.content);
                        const repoUrl = `https://github.com/${data.html_url.split('github.com/')[1].split('/blob')[0]}`;
                        content.innerHTML = `<div style="padding:10px; background:#222;"><button onclick="Apps.loadUrl(this.closest('.window'), '${repoUrl}')">Back to Repo</button></div><div class="code-view">${txt.replace(/</g, '&lt;')}</div>`;
                    } else { content.innerHTML = "File too big or binary."; }
                });
            },

            decodeBase64: function(str) {
                try {
                    const clean = str.replace(/\s/g, '');
                    const binary = atob(clean);
                    const bytes = new Uint8Array(binary.length);
                    for (let i = 0; i < binary.length; i++) bytes[i] = binary.charCodeAt(i);
                    return new TextDecoder('utf-8').decode(bytes);
                } catch(e) { return "Error decoding text: " + e.message; }
            },

            // --- MINESWEEPER LOGIC ---
            minesweeper: {
                games: {}, // Store game state by Window ID
                timers: {},

                run: function() {
                    const id = System.openWindow('Minesweeper', '', '300px', '400px');
                    this.initGame(id);
                },

                initGame: function(id) {
                    const win = document.getElementById(id);
                    const body = win.querySelector('.win-body');
                    
                    // Create UI
                    body.innerHTML = `
                        <div class="ms-container" oncontextmenu="return false;">
                            <div class="ms-header">
                                <div class="ms-counter" id="ms-mines-${id}">010</div>
                                <div class="ms-face" onclick="Apps.minesweeper.reset('${id}')" id="ms-face-${id}">🙂</div>
                                <div class="ms-counter" id="ms-timer-${id}">000</div>
                            </div>
                            <div class="ms-grid" id="ms-grid-${id}"></div>
                        </div>
                    `;

                    this.reset(id);
                },

                reset: function(id) {
                    const state = {
                        grid: [], // 9x9
                        mines: [],
                        gameOver: false,
                        revealed: 0,
                        flags: 0,
                        time: 0,
                        firstClick: true
                    };
                    this.games[id] = state;
                    
                    if(this.timers[id]) clearInterval(this.timers[id]);
                    document.getElementById(`ms-timer-${id}`).innerText = "000";
                    document.getElementById(`ms-mines-${id}`).innerText = "010";
                    document.getElementById(`ms-face-${id}`).innerText = "🙂";

                    const gridEl = document.getElementById(`ms-grid-${id}`);
                    gridEl.innerHTML = '';
                    
                    // Create Cells
                    for(let r=0; r<9; r++) {
                        state.grid[r] = [];
                        for(let c=0; c<9; c++) {
                            const cell = document.createElement('div');
                            cell.className = 'ms-cell';
                            cell.onmousedown = (e) => this.click(id, r, c, e.button);
                            gridEl.appendChild(cell);
                            state.grid[r][c] = {
                                isMine: false,
                                isOpen: false,
                                isFlag: false,
                                el: cell,
                                neighbors: 0
                            };
                        }
                    }
                },

                generateMines: function(id, avoidR, avoidC) {
                    const state = this.games[id];
                    let placed = 0;
                    while(placed < 10) {
                        let r = Math.floor(Math.random() * 9);
                        let c = Math.floor(Math.random() * 9);
                        if (!state.grid[r][c].isMine && (r !== avoidR || c !== avoidC)) {
                            state.grid[r][c].isMine = true;
                            placed++;
                        }
                    }

                    // Calc neighbors
                    for(let r=0; r<9; r++) {
                        for(let c=0; c<9; c++) {
                            if(state.grid[r][c].isMine) continue;
                            let count = 0;
                            for(let i=-1; i<=1; i++) {
                                for(let j=-1; j<=1; j++) {
                                    if(r+i>=0 && r+i<9 && c+j>=0 && c+j<9 && state.grid[r+i][c+j].isMine) count++;
                                }
                            }
                            state.grid[r][c].neighbors = count;
                        }
                    }
                },

                click: function(id, r, c, btn) {
                    const state = this.games[id];
                    if(state.gameOver) return;

                    // Start Timer
                    if(state.firstClick) {
                        state.firstClick = false;
                        this.generateMines(id, r, c);
                        this.timers[id] = setInterval(() => {
                            state.time++;
                            document.getElementById(`ms-timer-${id}`).innerText = state.time.toString().padStart(3,'0');
                        }, 1000);
                    }

                    // Right Click (Flag)
                    if(btn === 2) {
                        const cell = state.grid[r][c];
                        if(!cell.isOpen) {
                            cell.isFlag = !cell.isFlag;
                            cell.el.innerText = cell.isFlag ? "🚩" : "";
                            cell.el.classList.toggle('flag');
                            state.flags += cell.isFlag ? 1 : -1;
                            document.getElementById(`ms-mines-${id}`).innerText = (10 - state.flags).toString().padStart(3,'0');
                        }
                        return;
                    }

                    // Left Click
                    if(btn === 0) {
                        this.open(id, r, c);
                    }
                },

                open: function(id, r, c) {
                    const state = this.games[id];
                    const cell = state.grid[r][c];
                    
                    if(cell.isOpen || cell.isFlag) return;

                    cell.isOpen = true;
                    cell.el.classList.add('open');
                    state.revealed++;

                    if(cell.isMine) {
                        // LOSS
                        cell.el.classList.add('mine');
                        cell.el.innerText = "💣";
                        this.gameOver(id, false);
                    } else {
                        if(cell.neighbors > 0) {
                            cell.el.innerText = cell.neighbors;
                            cell.el.classList.add('c'+cell.neighbors);
                        } else {
                            // Flood fill
                            for(let i=-1; i<=1; i++) {
                                for(let j=-1; j<=1; j++) {
                                    if(r+i>=0 && r+i<9 && c+j>=0 && c+j<9) this.open(id, r+i, c+j);
                                }
                            }
                        }
                        // Check Win
                        if(state.revealed === (81 - 10)) {
                            this.gameOver(id, true);
                        }
                    }
                },

                gameOver: function(id, won) {
                    const state = this.games[id];
                    state.gameOver = true;
                    clearInterval(this.timers[id]);
                    document.getElementById(`ms-face-${id}`).innerText = won ? "😎" : "😵";
                    
                    if(!won) {
                        // Reveal all mines
                        state.grid.forEach(row => row.forEach(cell => {
                            if(cell.isMine) {
                                cell.el.classList.add('mine');
                                cell.el.innerText = "💣";
                            }
                        }));
                    }
                }
            }
        };

        // Close start menu on click outside
        document.addEventListener('click', e => {
            const s = document.getElementById('start');
            const btn = document.querySelector('.tb-btn[title="Start"]');
            if (!s.contains(e.target) && !btn.contains(e.target)) {
                s.classList.remove('show');
            }
        });

    </script>
</body>
</html>
