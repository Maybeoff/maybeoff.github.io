  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Мои GitHub Pages</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      background: linear-gradient(135deg, #0f0f1e 0%, #1a1a2e 50%, #16213e 100%);
      color: #fff;
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      min-height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      padding: 20px;
    }

    .container {
      width: 100%;
      max-width: 900px;
    }

    .header {
      text-align: center;
      margin-bottom: 60px;
      animation: fadeInDown 0.8s ease-out;
    }

    .header h1 {
      font-size: 48px;
      margin-bottom: 10px;
      background: linear-gradient(135deg, #00d4ff, #0099ff);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      font-weight: 700;
    }

    .header p {
      font-size: 16px;
      color: #a0a0a0;
      font-weight: 300;
    }

    .loading-container {
      display: flex;
      justify-content: center;
      align-items: center;
      gap: 8px;
      margin: 40px 0;
      min-height: 40px;
    }

    .loading-dot {
      width: 12px;
      height: 12px;
      border-radius: 50%;
      background: linear-gradient(135deg, #00d4ff, #0099ff);
      animation: bounce 1.4s infinite ease-in-out;
    }

    .loading-dot:nth-child(1) {
      animation-delay: -0.32s;
    }

    .loading-dot:nth-child(2) {
      animation-delay: -0.16s;
    }

    @keyframes bounce {
      0%, 80%, 100% {
        transform: scale(0);
        opacity: 0.5;
      }
      40% {
        transform: scale(1);
        opacity: 1;
      }
    }

    .sites-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
      gap: 20px;
      animation: fadeIn 0.6s ease-out;
    }

    .site-card {
      background: rgba(255, 255, 255, 0.05);
      border: 1px solid rgba(0, 212, 255, 0.2);
      border-radius: 12px;
      padding: 24px;
      text-decoration: none;
      color: #fff;
      transition: all 0.3s ease;
      cursor: pointer;
      position: relative;
      overflow: hidden;
      animation: slideUp 0.5s ease-out forwards;
      opacity: 0;
    }

    .site-card:nth-child(1) { animation-delay: 0.1s; }
    .site-card:nth-child(2) { animation-delay: 0.2s; }
    .site-card:nth-child(3) { animation-delay: 0.3s; }
    .site-card:nth-child(4) { animation-delay: 0.4s; }
    .site-card:nth-child(5) { animation-delay: 0.5s; }
    .site-card:nth-child(6) { animation-delay: 0.6s; }
    .site-card:nth-child(n+7) { animation-delay: 0.7s; }

    .site-card::before {
      content: '';
      position: absolute;
      top: 0;
      left: -100%;
      width: 100%;
      height: 100%;
      background: linear-gradient(90deg, transparent, rgba(0, 212, 255, 0.1), transparent);
      transition: left 0.5s ease;
    }

    .site-card:hover::before {
      left: 100%;
    }

    .site-card:hover {
      border-color: rgba(0, 212, 255, 0.6);
      background: rgba(0, 212, 255, 0.1);
      transform: translateY(-8px);
      box-shadow: 0 8px 32px rgba(0, 212, 255, 0.2);
    }

    .site-card-content {
      position: relative;
      z-index: 1;
    }

    .site-card-icon {
      font-size: 32px;
      margin-bottom: 12px;
    }

    .site-card-name {
      font-size: 18px;
      font-weight: 600;
      margin-bottom: 8px;
      word-break: break-word;
    }

    .site-card-link {
      font-size: 12px;
      color: #00d4ff;
      opacity: 0.7;
      transition: opacity 0.3s;
    }

    .site-card:hover .site-card-link {
      opacity: 1;
    }

    .empty-state {
      text-align: center;
      padding: 40px;
      color: #a0a0a0;
    }

    .empty-state-icon {
      font-size: 64px;
      margin-bottom: 20px;
    }

    @keyframes fadeInDown {
      from {
        opacity: 0;
        transform: translateY(-30px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    @keyframes fadeIn {
      from {
        opacity: 0;
      }
      to {
        opacity: 1;
      }
    }

    @keyframes slideUp {
      from {
        opacity: 0;
        transform: translateY(30px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    @media (max-width: 768px) {
      .header h1 {
        font-size: 36px;
      }

      .sites-grid {
        grid-template-columns: 1fr;
      }
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="header">
      <h1>🚀 GitHub Pages</h1>
      <p>Мои проекты и сайты</p>
    </div>

    <div class="loading-container" id="loading">
      <div class="loading-dot"></div>
      <div class="loading-dot"></div>
      <div class="loading-dot"></div>
    </div>

    <div class="sites-grid" id="sites" style="display: none;"></div>
    <div class="empty-state" id="empty" style="display: none;">
      <div class="empty-state-icon">📭</div>
      <p>Нет доступных проектов</p>
    </div>
  </div>

  <script>
    const username = "Maybeoff";
    const exclude = ["maybeoff", "maybeoff.github.io", "fem-boy.ru", "redirect"];
    const sitesContainer = document.getElementById("sites");
    const loadingContainer = document.getElementById("loading");
    const emptyState = document.getElementById("empty");

    fetch(`https://api.github.com/users/${username}/repos`)
      .then(res => res.json())
      .then(repos => {
        const filteredRepos = repos.filter(repo => 
          repo.has_pages && !exclude.includes(repo.name)
        );

        loadingContainer.style.display = "none";

        if (filteredRepos.length === 0) {
          emptyState.style.display = "block";
          return;
        }

        sitesContainer.style.display = "grid";

        // Добавляем speedtest.html
        const speedtestCard = document.createElement("a");
        speedtestCard.href = "speedtest.html";
        speedtestCard.className = "site-card";
        speedtestCard.innerHTML = `
          <div class="site-card-content">
            <div class="site-card-icon">⚡</div>
            <div class="site-card-name">speedtest</div>
            <div class="site-card-link">Открыть →</div>
          </div>
        `;
        sitesContainer.appendChild(speedtestCard);

        filteredRepos.forEach(repo => {
          const url = `https://${username}.github.io/${repo.name}/`;
          const card = document.createElement("a");
          card.href = url;
          card.className = "site-card";
          card.target = "_blank";
          card.rel = "noopener noreferrer";
          
          card.innerHTML = `
            <div class="site-card-content">
              <div class="site-card-icon">🔗</div>
              <div class="site-card-name">${repo.name}</div>
              <div class="site-card-link">Открыть →</div>
            </div>
          `;
          
          sitesContainer.appendChild(card);
        });
      })
      .catch(error => {
        console.error("Ошибка загрузки репозиториев:", error);
        loadingContainer.style.display = "none";
        emptyState.style.display = "block";
        emptyState.innerHTML = '<div class="empty-state-icon">⚠️</div><p>Ошибка при загрузке данных</p>';
      });
  </script>
</body>
</html>
