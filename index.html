<!doctype html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>AI-Windows V2.0 - GitHub Integration</title>
    <style>
        /* --- CORE SYSTEM STYLES --- */
        :root {
            --bg-color: #111;
            --accent: #0078d4;
            --accent-hover: #006cc1;
            --glass-bg: rgba(30, 30, 30, 0.9);
            --glass-border: rgba(255, 255, 255, 0.1);
            --text-main: #fff;
            --font-stack: 'Segoe UI', system-ui, sans-serif;
            --taskbar-height: 48px;
            --window-radius: 8px;
        }

        * { box-sizing: border-box; user-select: none; outline: none; }
        body, html { margin: 0; padding: 0; height: 100%; overflow: hidden; font-family: var(--font-stack); background: #000; color: var(--text-main); }
        
        /* Utils */
        .hidden { display: none !important; }
        .col { display: flex; flex-direction: column; }
        .row { display: flex; flex-direction: row; }
        .center { display: flex; align-items: center; justify-content: center; }

        /* --- LAYERS --- */
        #bios { position: fixed; inset: 0; background: #000; z-index: 9999; padding: 40px; font-family: monospace; color: #fff; display: flex; flex-direction: column; }
        #login-screen { position: fixed; inset: 0; z-index: 8000; background: #000; display: flex; flex-direction: column; align-items: center; justify-content: center; transition: opacity 0.5s; }
        #desktop { position: absolute; inset: 0; z-index: 1; overflow: hidden; }
        #wallpaper-canvas { position: absolute; inset: 0; z-index: -1; }

        /* --- UI COMPONENTS --- */
        /* Login */
        .user-avatar { width: 120px; height: 120px; background: #333; border-radius: 50%; margin-bottom: 20px; display: flex; align-items: center; justify-content: center; font-size: 40px; border: 2px solid var(--accent); box-shadow: 0 0 30px var(--accent); }
        .login-input { padding: 10px; border-radius: 4px; border: 1px solid #555; background: #222; color: #fff; width: 200px; margin-bottom: 10px; text-align: center; font-size: 16px; letter-spacing: 2px; }
        .login-btn { padding: 8px 20px; background: var(--accent); color: #fff; border: none; cursor: pointer; border-radius: 4px; font-weight: bold; }

        /* Icons */
        #desktop-icons { position: absolute; top: 10px; left: 10px; display: flex; flex-direction: column; gap: 10px; height: 90%; flex-wrap: wrap; align-content: flex-start; }
        .d-icon { width: 84px; display: flex; flex-direction: column; align-items: center; cursor: pointer; padding: 8px 5px; border-radius: 4px; text-align: center; color: #fff; text-shadow: 0 1px 4px rgba(0,0,0,0.8); transition: 0.1s; }
        .d-icon:hover { background: rgba(255,255,255,0.1); }
        .d-icon.selected { background: rgba(255,255,255,0.2); border: 1px dotted rgba(255,255,255,0.5); }
        .d-icon svg { width: 40px; height: 40px; margin-bottom: 4px; drop-shadow: 0 2px 5px rgba(0,0,0,0.6); }
        .d-icon span { font-size: 12px; line-height: 1.2; overflow: hidden; text-overflow: ellipsis; display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; }

        /* Windows */
        .window { position: absolute; background: var(--glass-bg); backdrop-filter: blur(15px); border: 1px solid var(--glass-border); border-radius: var(--window-radius); box-shadow: 0 20px 50px rgba(0,0,0,0.7); display: flex; flex-direction: column; overflow: hidden; min-width: 300px; min-height: 200px; transition: transform 0.1s, opacity 0.2s; }
        .win-header { height: 36px; background: rgba(255,255,255,0.03); display: flex; align-items: center; justify-content: space-between; padding: 0 12px; cursor: default; border-bottom: 1px solid rgba(255,255,255,0.05); }
        .win-title { font-size: 13px; display: flex; align-items: center; gap: 8px; pointer-events: none; }
        .win-controls { display: flex; gap: 8px; }
        .win-btn { width: 12px; height: 12px; border-radius: 50%; border: none; cursor: pointer; }
        .btn-close { background: #ff5f56; } .btn-min { background: #ffbd2e; } .btn-max { background: #27c93f; }
        .win-content { flex: 1; overflow: hidden; position: relative; display: flex; flex-direction: column; background: #1a1a1a; }
        .window.minimized { transform: scale(0.5) translateY(500px); opacity: 0; pointer-events: none; }
        .window.active { border: 1px solid rgba(255,255,255,0.25); box-shadow: 0 25px 60px rgba(0,0,0,0.9); }

        /* Taskbar */
        #taskbar { position: absolute; bottom: 0; left: 0; right: 0; height: var(--taskbar-height); background: rgba(20, 20, 20, 0.9); backdrop-filter: blur(20px); display: flex; align-items: center; justify-content: space-between; padding: 0 12px; z-index: 5000; border-top: 1px solid rgba(255,255,255,0.1); }
        .tb-part { display: flex; align-items: center; gap: 6px; height: 100%; }
        .tb-btn { width: 42px; height: 40px; border-radius: 4px; display: flex; align-items: center; justify-content: center; cursor: pointer; transition: 0.2s; position: relative; }
        .tb-btn:hover { background: rgba(255,255,255,0.1); }
        .tb-btn.running::after { content: ''; position: absolute; bottom: 3px; width: 16px; height: 3px; background: #aaa; border-radius: 2px; }
        .tb-btn.active-win { background: rgba(255,255,255,0.15); }
        .tb-btn.active-win::after { background: var(--accent); width: 24px; }
        .tb-clock { font-size: 12px; text-align: right; color: #ddd; cursor: default; line-height: 1.3; }

        /* Start Menu */
        #start-menu { position: absolute; bottom: 55px; left: 10px; width: 420px; height: 520px; background: rgba(30, 30, 30, 0.95); backdrop-filter: blur(25px); border-radius: 8px; border: 1px solid var(--glass-border); z-index: 4999; display: flex; flex-direction: column; opacity: 0; pointer-events: none; transition: 0.2s; transform: translateY(20px); padding: 20px; box-shadow: 0 0 50px rgba(0,0,0,0.5); }
        #start-menu.open { opacity: 1; pointer-events: all; transform: translateY(0); }
        .start-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 10px; padding-top: 20px; }
        .start-item { display: flex; flex-direction: column; align-items: center; gap: 8px; cursor: pointer; padding: 12px; border-radius: 6px; transition: 0.2s; }
        .start-item:hover { background: rgba(255,255,255,0.1); }

        /* --- APP SPECIFIC --- */
        
        /* Explorer */
        .exp-bar { height: 42px; background: #252525; display: flex; align-items: center; padding: 0 10px; gap: 10px; border-bottom: 1px solid #333; }
        .exp-btn { background: transparent; border: none; color: #fff; padding: 6px 10px; border-radius: 4px; cursor: pointer; font-size: 14px; }
        .exp-btn:hover { background: rgba(255,255,255,0.1); }
        .exp-path-input { flex: 1; background: #1a1a1a; border: 1px solid #444; color: #fff; padding: 5px 12px; border-radius: 4px; font-size: 13px; font-family: monospace; }
        .exp-body { display: flex; height: 100%; }
        .exp-side { width: 170px; background: #202020; border-right: 1px solid #333; padding: 10px 0; font-size: 13px; }
        .exp-link { padding: 8px 15px; cursor: pointer; display: flex; align-items: center; gap: 10px; }
        .exp-link:hover { background: rgba(255,255,255,0.05); }
        .exp-view { flex: 1; padding: 10px; overflow-y: auto; display: grid; grid-template-columns: repeat(auto-fill, minmax(90px, 1fr)); grid-auto-rows: 100px; gap: 5px; background: #111; }
        .exp-item { display: flex; flex-direction: column; align-items: center; justify-content: center; cursor: pointer; border: 1px solid transparent; border-radius: 4px; padding: 5px; color: #eee; text-align: center; }
        .exp-item:hover { background: rgba(255,255,255,0.08); }
        .exp-item.selected { background: rgba(0, 120, 212, 0.2); border-color: rgba(0, 120, 212, 0.5); }

        /* Browser */
        .browser-bar { height: 44px; background: #2b2b2b; display: flex; align-items: center; padding: 0 10px; gap: 8px; border-bottom: 1px solid #444; }
        .browser-input { flex: 1; background: #1a1a1a; border: 1px solid #444; color: #fff; padding: 6px 15px; border-radius: 20px; font-size: 13px; transition: 0.2s; }
        .browser-input:focus { border-color: var(--accent); background: #000; }
        .browser-frame { width: 100%; height: 100%; border: none; background: #fff; }
        .browser-home { padding: 40px; text-align: center; color: #000; background: #fff; height: 100%; overflow: auto; }
        .rec-link { display: inline-block; margin: 10px; padding: 10px 20px; background: #f0f0f0; border-radius: 8px; color: #0078d4; text-decoration: none; cursor: pointer; border: 1px solid #ddd; }
        .rec-link:hover { background: #e0e0e0; }

        /* Notepad */
        .notepad-menu { height: 26px; background: #2b2b2b; display: flex; align-items: center; padding: 0 5px; font-size: 12px; }
        .menu-item { padding: 4px 12px; cursor: pointer; }
        .menu-item:hover { background: #444; }
        .notepad-area { flex: 1; background: #1e1e1e; color: #e0e0e0; border: none; padding: 15px; font-family: 'Consolas', monospace; resize: none; font-size: 14px; line-height: 1.6; }

        /* Settings */
        .set-layout { display: flex; height: 100%; background: #111; }
        .set-side { width: 180px; background: rgba(255,255,255,0.03); padding: 20px 10px; display: flex; flex-direction: column; gap: 5px; }
        .set-tab { padding: 10px 15px; cursor: pointer; border-radius: 4px; font-size: 14px; }
        .set-tab:hover { background: rgba(255,255,255,0.05); }
        .set-tab.active { background: rgba(255,255,255,0.1); font-weight: bold; border-left: 3px solid var(--accent); }
        .set-main { flex: 1; padding: 30px; overflow-y: auto; }
        .color-dot { width: 32px; height: 32px; border-radius: 50%; cursor: pointer; border: 2px solid transparent; transition: 0.2s; }
        .color-dot:hover { transform: scale(1.15); }

        svg { pointer-events: none; fill: currentColor; }
    </style>
</head>
<body>

    <!-- BOOT SCREEN -->
    <div id="bios">
        <div style="color:var(--accent); font-weight:bold; font-size:24px; margin-bottom:20px;">AI-BIOS v2.1</div>
        <div id="bios-log">Initializing Network Stack...</div>
        <div style="width:300px; height:6px; background:#333; margin-top:20px; border-radius:3px; overflow:hidden;">
            <div id="bios-bar" style="height:100%; background:var(--accent); width:0%"></div>
        </div>
    </div>

    <!-- LOGIN -->
    <div id="login-screen" class="hidden">
        <div class="user-avatar">👤</div>
        <h2 style="color:#fff; font-weight:400; margin-bottom:20px;">AI User</h2>
        <input type="password" class="login-input" id="login-pass" placeholder="PIN: 1234">
        <button class="login-btn" onclick="OS.auth()">Log In</button>
    </div>

    <!-- DESKTOP -->
    <div id="desktop" class="hidden">
        <canvas id="wallpaper-canvas"></canvas>
        <div id="desktop-icons"></div>
        <div id="window-area"></div>
    </div>

    <!-- TASKBAR -->
    <div id="taskbar" class="hidden">
        <div class="tb-part">
            <div class="tb-btn" onclick="OS.ui.toggleStart()" title="Start">
                <svg width="22" height="22" viewBox="0 0 24 24"><path d="M4 4h16v16H4V4zm2 2v12h12V6H6z" fill="#fff"/></svg>
            </div>
            <div id="tb-apps" class="row" style="gap:2px"></div>
        </div>
        <div class="tb-part">
            <div class="tb-clock" id="clock">12:00</div>
        </div>
    </div>

    <!-- START MENU -->
    <div id="start-menu">
        <div style="margin-bottom:10px; font-weight:bold; font-size:13px; color:#ccc;">Pinned Apps</div>
        <div class="start-grid" id="start-grid"></div>
        <div style="margin-top:auto; padding-top:15px; border-top:1px solid #444; display:flex; justify-content:space-between; align-items:center;">
            <div class="center" style="gap:10px;">
                <div style="width:28px; height:28px; background:#555; border-radius:50%; display:flex; justify-content:center; align-items:center; font-size:12px;">AI</div>
                <span style="font-size:13px;">AI User</span>
            </div>
            <div class="tb-btn" style="width:36px; height:36px;" onclick="location.reload()" title="Power Off">⏻</div>
        </div>
    </div>

    <script>
    /**
     * AI-WINDOWS V2.0 - With GitHub Integration
     */

    // --- ICONS ---
    const ICONS = {
        pc: '<svg viewBox="0 0 24 24" fill="#50e6ff"><path d="M2 4h18v14H2V4zm2 2v10h14V6H4zm3 14h10v2H7v-2z"/></svg>',
        folder: '<svg viewBox="0 0 24 24" fill="#fce566"><path d="M10 4H4c-1.1 0-1.99.9-1.99 2L2 18c0 1.1.9 2 2 2h16c1.1 0 2-.9 2-2V8c0-1.1-.9-2-2-2h-8l-2-2z"/></svg>',
        file: '<svg viewBox="0 0 24 24" fill="#fff"><path d="M14 2H6a2 2 0 00-2 2v16a2 2 0 002 2h12a2 2 0 002-2V8l-6-6zm2 16H8v-2h8v2zm0-4H8v-2h8v2zm-3-5V3.5L18.5 9H13z"/></svg>',
        notepad: '<svg viewBox="0 0 24 24" fill="#00dcb4"><path d="M15 6H3v14h18V10l-6-4zm-1 9h-4v-2h4v2zm0-4h-4V9h4v2zM5 8h8v2H5V8zm0 4h3v2H5v-2zm0 4h8v2H5v-2z"/></svg>',
        browser: '<svg viewBox="0 0 24 24" fill="#369eff"><path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm-1 17.93c-3.95-.49-7-3.85-7-7.93 0-.62.08-1.21.21-1.79L9 15v1c0 1.1.9 2 2 2v1.93zm6.9-2.54c-.26-.81-1-1.39-1.9-1.39h-1v-3c0-.55-.45-1-1-1H8v-2h2c.55 0 1-.45 1-1V7h2c1.1 0 2-.9 2-2v-.41c2.93 1.19 5 4.06 5 7.41 0 2.08-.8 3.97-2.1 5.39z"/></svg>',
        settings: '<svg viewBox="0 0 24 24" fill="#ddd"><path d="M19.43 12.98c.04-.32.07-.64.07-.98s-.03-.66-.07-.98l2.11-1.65c.19-.15.24-.42.12-.64l-2-3.46c-.12-.22-.39-.3-.61-.22l-2.49 1c-.52-.4-1.08-.73-1.69-.98l-.38-2.65C14.46 2.18 14.25 2 14 2h-4c-.25 0-.46.18-.49.42l-.38 2.65c-.61.25-1.17.59-1.69.98l-2.49-1c-.23-.09-.49 0-.61.22l-2 3.46c-.13.22-.07.49.12.64l2.11 1.65c-.04.32-.07.65-.07.98s.03.66.07.98l-2.11 1.65c-.19.15-.24.42-.12.64l2 3.46c.12.22.39.3.61.22l2.49-1c.52.4 1.08.73 1.69.98l.38 2.65c.03.24.24.42.49.42h4c.25 0 .46-.18.49-.42l.38-2.65c.61-.25 1.17-.59 1.69-.98l2.49 1c.23.09.49 0 .61-.22l2-3.46c.12-.22.07-.49-.12-.64l-2.11-1.65zM12 15.5c-1.93 0-3.5-1.57-3.5-3.5s1.57-3.5 3.5-3.5 3.5 1.57 3.5 3.5-1.57 3.5-3.5 3.5z"/></svg>',
        github: '<svg viewBox="0 0 24 24" fill="#fff"><path d="M12 2C6.477 2 2 6.477 2 12c0 4.42 2.865 8.17 6.839 9.49.5.092.682-.217.682-.482 0-.237-.008-.866-.013-1.7-2.782.604-3.369-1.34-3.369-1.34-.454-1.156-1.11-1.464-1.11-1.464-.908-.62.069-.608.069-.608 1.003.07 1.531 1.03 1.531 1.03.892 1.529 2.341 1.087 2.91.832.092-.647.35-1.088.636-1.338-2.22-.253-4.555-1.11-4.555-4.943 0-1.091.39-1.984 1.029-2.683-.103-.253-.446-1.27.098-2.647 0 0 .84-.27 2.75 1.026A9.564 9.564 0 0112 6.844c.85.004 1.705.115 2.504.337 1.909-1.296 2.747-1.027 2.747-1.027.546 1.379.202 2.398.1 2.651.64.699 1.028 1.592 1.028 2.683 0 3.842-2.339 4.687-4.566 4.935.359.309.678.92.678 1.855 0 1.338-.012 2.419-.012 2.747 0 .268.18.58.688.482A10.019 10.019 0 0022 12c0-5.523-4.477-10-10-10z"/></svg>',
        repo: '<svg viewBox="0 0 24 24" fill="#6CC644"><path d="M4 18.5v-13C4 4.12 5.12 3 6.5 3h11C18.88 3 20 4.12 20 5.5v13c0 1.38-1.12 2.5-2.5 2.5h-11C5.12 21 4 19.88 4 18.5zM6.5 5c-.28 0-.5.22-.5.5v13c0 .28.22.5.5.5h11c.28 0 .5-.22.5-.5v-13c0-.28-.22-.5-.5-.5h-11zM10 16h4v2h-4v-2zm0-4h4v2h-4v-2zm0-4h4v2h-4V8z"/></svg>'
    };

    // --- FILE SYSTEM ---
    const FS = {
        data: {
            "C:": {
                type: "folder",
                children: {
                    "Documents": {
                        type: "folder",
                        children: {
                            "Notes.txt": { type: "file", content: "Remember to check GitHub." },
                            "Project.txt": { type: "file", content: "To see repos, go to github:/maybeoff" }
                        }
                    },
                    "Pictures": { type: "folder", children: {} },
                    "System": { type: "folder", children: { "syslog.txt": { type: "file", content: "Boot OK." } } }
                }
            }
        },
        get: function(pathArr) {
            let curr = this.data;
            for(let p of pathArr) {
                if(curr[p] && curr[p].children) curr = curr[p].children;
                else return null;
            }
            return curr;
        },
        save: function(pathStr, content) {
            const parts = pathStr.split('/');
            const name = parts.pop();
            const dir = this.get(parts);
            if(dir) {
                dir[name] = { type: 'file', content: content };
                return true;
            }
            return false;
        }
    };

    // --- OS CORE ---
    const OS = {
        windows: [],
        zIndex: 100,

        init: function() {
            let p = 0;
            const bar = document.getElementById('bios-bar');
            const log = document.getElementById('bios-log');
            const t = setInterval(() => {
                p+=5; bar.style.width = p+'%';
                if(p===40) log.innerText = "Loading Modules...";
                if(p===80) log.innerText = "Starting UI...";
                if(p>=100) {
                    clearInterval(t);
                    document.getElementById('bios').classList.add('hidden');
                    document.getElementById('login-screen').classList.remove('hidden');
                }
            }, 50);
            this.wallpaper.init();
            this.ui.clock();
        },

        auth: function() {
            const val = document.getElementById('login-pass').value;
            if(val === '1234') {
                const ls = document.getElementById('login-screen');
                ls.style.opacity = 0;
                setTimeout(() => {
                    ls.classList.add('hidden');
                    document.getElementById('desktop').classList.remove('hidden');
                    document.getElementById('taskbar').classList.remove('hidden');
                    this.renderDesktop();
                }, 500);
            } else alert("Try 1234");
        },

        // --- WINDOW MANAGER ---
        wm: {
            open: function(app, title, html, icon, w=600, h=450) {
                const id = 'win-'+Date.now();
                const el = document.createElement('div');
                el.className = 'window active';
                el.id = id;
                el.style.width = w+'px'; el.style.height = h+'px';
                el.style.top = (50+OS.windows.length*20)+'px';
                el.style.left = (50+OS.windows.length*20)+'px';
                el.style.zIndex = ++OS.zIndex;
                el.innerHTML = `
                    <div class="win-header" onmousedown="OS.wm.drag(event, '${id}')">
                        <div class="win-title">${icon} ${title}</div>
                        <div class="win-controls">
                            <button class="win-btn btn-min" onclick="OS.wm.min('${id}')"></button>
                            <button class="win-btn btn-max" onclick="OS.wm.max('${id}')"></button>
                            <button class="win-btn btn-close" onclick="OS.wm.close('${id}')"></button>
                        </div>
                    </div>
                    <div class="win-content">${html}</div>
                `;
                el.onmousedown = () => OS.wm.focus(id);
                document.getElementById('window-area').appendChild(el);
                
                // Taskbar
                const tb = document.createElement('div');
                tb.className = 'tb-btn running active-win';
                tb.id = 'tb-'+id;
                tb.innerHTML = icon;
                tb.onclick = () => OS.wm.toggle(id);
                document.getElementById('tb-apps').appendChild(tb);

                OS.windows.push({id, el, tb});
                return id;
            },
            close: function(id) {
                const w = OS.windows.find(x=>x.id===id);
                if(w) {
                    w.el.style.opacity = 0;
                    w.el.style.transform = 'scale(0.9)';
                    setTimeout(()=>w.el.remove(), 200);
                    w.tb.remove();
                    OS.windows = OS.windows.filter(x=>x.id!==id);
                }
            },
            focus: function(id) {
                const w = OS.windows.find(x=>x.id===id);
                if(w) {
                    w.el.style.zIndex = ++OS.zIndex;
                    OS.windows.forEach(i => {
                        i.el.classList.remove('active');
                        i.tb.classList.remove('active-win');
                    });
                    w.el.classList.add('active');
                    w.tb.classList.add('active-win');
                    w.el.classList.remove('minimized');
                }
            },
            min: function(id) {
                const w = OS.windows.find(x=>x.id===id);
                w.el.classList.add('minimized');
                w.el.classList.remove('active');
                w.tb.classList.remove('active-win');
            },
            max: function(id) {
                const w = OS.windows.find(x=>x.id===id);
                if(w.el.style.width === '100%') {
                    w.el.style.width = '600px'; w.el.style.height = '450px';
                    w.el.style.top = '50px'; w.el.style.left = '50px';
                } else {
                    w.el.style.width = '100%'; w.el.style.height = 'calc(100% - 48px)';
                    w.el.style.top = '0'; w.el.style.left = '0';
                }
            },
            toggle: function(id) {
                const w = OS.windows.find(x=>x.id===id);
                if(w.el.classList.contains('minimized') || !w.el.classList.contains('active')) OS.wm.focus(id);
                else OS.wm.min(id);
            },
            drag: function(e, id) {
                if(e.target.tagName === 'BUTTON') return;
                const win = document.getElementById(id);
                let startX = e.clientX, startY = e.clientY;
                let rect = win.getBoundingClientRect();
                let offX = startX - rect.left, offY = startY - rect.top;
                
                const move = (ev) => {
                    win.style.left = (ev.clientX - offX) + 'px';
                    win.style.top = (ev.clientY - offY) + 'px';
                };
                const up = () => {
                    document.removeEventListener('mousemove', move);
                    document.removeEventListener('mouseup', up);
                };
                document.addEventListener('mousemove', move);
                document.addEventListener('mouseup', up);
            }
        },

        // --- APPS ---
        apps: {
            explorer: {
                run: function() {
                    const html = `
                    <div class="col" style="height:100%">
                        <div class="exp-bar">
                            <button class="exp-btn" onclick="OS.apps.explorer.up(this)">↑</button>
                            <input class="exp-path-input" value="C:" onkeydown="if(event.key==='Enter') OS.apps.explorer.manualNav(this)">
                        </div>
                        <div class="exp-body">
                            <div class="exp-side">
                                <div class="exp-link" onclick="OS.apps.explorer.nav(this, ['C:'])">${ICONS.pc} This PC</div>
                                <div class="exp-link" onclick="OS.apps.explorer.nav(this, ['C:','Documents'])">${ICONS.folder} Docs</div>
                                <div style="margin:10px 0; border-top:1px solid #444;"></div>
                                <div class="exp-link" onclick="OS.apps.explorer.nav(this, ['github:', 'maybeoff'])">${ICONS.github} Projects</div>
                            </div>
                            <div class="exp-view"></div>
                        </div>
                    </div>`;
                    const id = OS.wm.open('explorer', 'File Explorer', html, ICONS.pc);
                    const el = document.getElementById(id);
                    el.dataset.path = JSON.stringify(['C:']);
                    OS.apps.explorer.refresh(el);
                },
                refresh: function(win) {
                    const path = JSON.parse(win.dataset.path);
                    const pathStr = path.join('/');
                    const input = win.querySelector('.exp-path-input');
                    const view = win.querySelector('.exp-view');
                    
                    input.value = pathStr;
                    view.innerHTML = '';

                    // === GITHUB LOGIC ===
                    if(path[0] === 'github:') {
                        const user = path[1] || 'maybeoff';
                        view.innerHTML = `<div style="padding:20px; text-align:center;">Fetching repositories for <b>${user}</b>...</div>`;
                        
                        fetch(`https://api.github.com/users/${user}/repos`)
                            .then(r => {
                                if(!r.ok) throw new Error("User not found or rate limit exceeded");
                                return r.json();
                            })
                            .then(data => {
                                view.innerHTML = '';
                                if(data.length === 0) {
                                    view.innerHTML = '<div style="padding:20px">No public repositories found.</div>';
                                    return;
                                }
                                data.forEach(repo => {
                                    const i = document.createElement('div');
                                    i.className = 'exp-item';
                                    i.innerHTML = `<div style="width:40px">${ICONS.repo}</div><span>${repo.name}</span>`;
                                    i.title = repo.description || "No description";
                                    i.ondblclick = () => {
                                        // Open in Browser
                                        OS.apps.browser.runWithUrl(repo.html_url);
                                    };
                                    view.appendChild(i);
                                });
                            })
                            .catch(err => {
                                view.innerHTML = `<div style="color:#ff5f56; padding:20px">Error: ${err.message}</div>`;
                            });
                        return;
                    }

                    // === LOCAL FS LOGIC ===
                    const dir = FS.get(path);
                    if(dir && dir.children) {
                        for(let name in dir.children) {
                            const item = dir.children[name];
                            const i = document.createElement('div');
                            i.className = 'exp-item';
                            i.innerHTML = `<div style="width:40px">${item.type==='folder'?ICONS.folder:ICONS.file}</div><span>${name}</span>`;
                            i.onclick = ()=> {
                                view.querySelectorAll('.exp-item').forEach(x=>x.classList.remove('selected'));
                                i.classList.add('selected');
                            };
                            i.ondblclick = ()=> {
                                if(item.type==='folder') {
                                    path.push(name);
                                    win.dataset.path = JSON.stringify(path);
                                    OS.apps.explorer.refresh(win);
                                } else if(name.endsWith('.txt')) {
                                    OS.apps.notepad.run(path.join('/')+'/'+name);
                                }
                            };
                            view.appendChild(i);
                        }
                    } else {
                        view.innerHTML = 'Directory not found.';
                    }
                },
                up: function(btn) {
                    const win = btn.closest('.window');
                    const path = JSON.parse(win.dataset.path);
                    if(path.length > 1) {
                        path.pop();
                        win.dataset.path = JSON.stringify(path);
                        OS.apps.explorer.refresh(win);
                    }
                },
                nav: function(btn, path) {
                    const win = btn.closest('.window');
                    win.dataset.path = JSON.stringify(path);
                    OS.apps.explorer.refresh(win);
                },
                manualNav: function(input) {
                    const win = input.closest('.window');
                    const val = input.value.trim();
                    if(val.startsWith('github:/')) {
                        // Parse github path
                        const parts = val.split('/');
                        win.dataset.path = JSON.stringify(parts);
                        OS.apps.explorer.refresh(win);
                    } else {
                        // Assume local path
                        const parts = val.split('/').filter(x => x);
                        win.dataset.path = JSON.stringify(parts);
                        OS.apps.explorer.refresh(win);
                    }
                }
            },
            notepad: {
                run: function(file) {
                    let txt = '';
                    let title = 'Untitled';
                    if(file) {
                        const parts = file.split('/');
                        title = parts.pop();
                        const f = FS.get(parts);
                        if(f && f[title]) txt = f[title].content;
                    }
                    const html = `
                    <div class="col" style="height:100%">
                        <div class="notepad-menu">
                            <div class="menu-item" onclick="OS.apps.notepad.save(this)">Save</div>
                            <div class="menu-item">Format</div>
                        </div>
                        <textarea class="notepad-area" spellcheck="false">${txt}</textarea>
                    </div>`;
                    const id = OS.wm.open('notepad', title+' - Notepad', html, ICONS.notepad, 500, 400);
                    const el = document.getElementById(id);
                    el.dataset.file = file || '';
                },
                save: function(btn) {
                    const win = btn.closest('.window');
                    const txt = win.querySelector('textarea').value;
                    let file = win.dataset.file;
                    if(!file) { file = "C:/Documents/New.txt"; win.dataset.file = file; }
                    FS.save(file, txt);
                    alert("Saved to " + file);
                }
            },
            browser: {
                run: function() {
                    this.runWithUrl('ai://home');
                },
                runWithUrl: function(url) {
                    const html = `
                    <div class="col" style="height:100%">
                        <div class="browser-bar">
                            <button class="exp-btn" onclick="OS.apps.browser.go(this, 'back')">←</button>
                            <button class="exp-btn" onclick="OS.apps.browser.go(this, 'reload')">↻</button>
                            <input class="browser-input" value="${url}" onkeydown="if(event.key==='Enter') OS.apps.browser.nav(this)">
                        </div>
                        <div class="col" style="flex:1; position:relative; overflow:hidden;">
                            <div class="browser-home ${url === 'ai://home' ? '' : 'hidden'}">
                                <h1>AI Browser</h1>
                                <p>Secure. Fast. AI-Powered.</p>
                                <hr style="border:0; border-top:1px solid #ddd; margin:20px 0;">
                                <div>
                                    <div class="rec-link" onclick="OS.apps.browser.load(this, 'https://www.wikipedia.org')">Wikipedia</div>
                                    <div class="rec-link" onclick="OS.apps.browser.load(this, 'https://www.bing.com')">Bing</div>
                                </div>
                            </div>
                            <iframe class="browser-frame ${url === 'ai://home' ? 'hidden' : ''}" src="${url !== 'ai://home' ? url : ''}"></iframe>
                        </div>
                    </div>`;
                    OS.wm.open('browser', 'AI Browser', html, ICONS.browser, 800, 500);
                },
                nav: function(inp) {
                    const win = inp.closest('.window');
                    OS.apps.browser.load(win, inp.value);
                },
                load: function(ref, url) {
                    const win = ref.closest ? ref.closest('.window') : ref; 
                    const input = win.querySelector('.browser-input');
                    const home = win.querySelector('.browser-home');
                    const frame = win.querySelector('.browser-frame');

                    if(url === 'ai://home') {
                        home.classList.remove('hidden');
                        frame.classList.add('hidden');
                        input.value = url;
                        return;
                    }

                    if(!url.startsWith('http') && !url.startsWith('ai://')) url = 'https://' + url;
                    
                    input.value = url;
                    home.classList.add('hidden');
                    frame.classList.remove('hidden');
                    frame.src = url;
                },
                go: function(btn, act) {
                    const win = btn.closest('.window');
                    const frame = win.querySelector('.browser-frame');
                    if(act === 'back') OS.apps.browser.load(win, 'ai://home');
                    if(act === 'reload') frame.src = frame.src;
                }
            },
            settings: {
                run: function() {
                    const html = `
                    <div class="set-layout">
                        <div class="set-side">
                            <div class="set-tab active" onclick="OS.apps.settings.tab(this, 'color')">Colors</div>
                            <div class="set-tab" onclick="OS.apps.settings.tab(this, 'info')">System</div>
                        </div>
                        <div class="set-main">
                            <div id="tab-color">
                                <h2>Accent Color</h2>
                                <div class="row" style="gap:10px">
                                    <div class="color-dot" style="background:#0078d4" onclick="OS.ui.accent('#0078d4')"></div>
                                    <div class="color-dot" style="background:#d13438" onclick="OS.ui.accent('#d13438')"></div>
                                    <div class="color-dot" style="background:#107c10" onclick="OS.ui.accent('#107c10')"></div>
                                    <div class="color-dot" style="background:#881798" onclick="OS.ui.accent('#881798')"></div>
                                </div>
                            </div>
                            <div id="tab-info" class="hidden">
                                <h2>System Info</h2>
                                <p>AI Windows v2.2</p>
                                <p>Integration: GitHub API Active</p>
                            </div>
                        </div>
                    </div>`;
                    OS.wm.open('settings', 'Settings', html, ICONS.settings, 600, 400);
                },
                tab: function(el, t) {
                    const win = el.closest('.window');
                    win.querySelectorAll('.set-tab').forEach(x=>x.classList.remove('active'));
                    el.classList.add('active');
                    win.querySelector('#tab-color').classList.add('hidden');
                    win.querySelector('#tab-info').classList.add('hidden');
                    win.querySelector('#tab-'+t).classList.remove('hidden');
                }
            }
        },

        ui: {
            clock: function() {
                setInterval(() => {
                    const d = new Date();
                    document.getElementById('clock').innerText = d.toLocaleTimeString([],{hour:'2-digit',minute:'2-digit'});
                }, 1000);
            },
            toggleStart: function() {
                document.getElementById('start-menu').classList.toggle('open');
            },
            accent: function(c) {
                document.documentElement.style.setProperty('--accent', c);
            }
        },
        
        renderDesktop: function() {
            const list = [
                {n:'This PC', i:ICONS.pc, a:OS.apps.explorer.run},
                {n:'Browser', i:ICONS.browser, a:OS.apps.browser.run},
                {n:'Notepad', i:ICONS.notepad, a:()=>OS.apps.notepad.run()},
                {n:'Settings', i:ICONS.settings, a:OS.apps.settings.run}
            ];
            const d = document.getElementById('desktop-icons');
            const s = document.getElementById('start-grid');
            d.innerHTML = ''; s.innerHTML = '';
            
            list.forEach(item => {
                // Desktop
                const el = document.createElement('div');
                el.className = 'd-icon';
                el.innerHTML = item.i + `<span>${item.n}</span>`;
                el.ondblclick = item.a;
                el.onclick = ()=> {
                    document.querySelectorAll('.d-icon').forEach(x=>x.classList.remove('selected'));
                    el.classList.add('selected');
                };
                d.appendChild(el);
                
                // Start
                const se = document.createElement('div');
                se.className = 'start-item';
                se.innerHTML = `<div style="width:32px">${item.i}</div><div style="font-size:12px">${item.n}</div>`;
                se.onclick = () => { item.a(); OS.ui.toggleStart(); };
                s.appendChild(se);
            });
        },

        wallpaper: {
            init: function() {
                const c = document.getElementById('wallpaper-canvas');
                const ctx = c.getContext('2d');
                let w, h;
                const r = () => {
                    w=c.width=window.innerWidth; h=c.height=window.innerHeight;
                    const g = ctx.createLinearGradient(0,0,0,h);
                    g.addColorStop(0,"#0f2027"); g.addColorStop(1,"#2c5364");
                    ctx.fillStyle=g; ctx.fillRect(0,0,w,h);
                };
                window.onresize = r; r();
            }
        }
    };

    document.addEventListener('click', (e) => {
        if(!e.target.closest('#start-menu') && !e.target.closest('.tb-btn[title="Start"]')) {
            document.getElementById('start-menu').classList.remove('open');
        }
    });

    OS.init();
    </script>
</body>
</html>
